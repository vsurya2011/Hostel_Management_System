spring:
  application:
    name: hostel-management-system
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=600s
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@hostel.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:VGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JIb3N0ZWxNYW5hZ2VtZW50U3lzdGVtSldUMjAyNA==}
  expiration-ms: ${JWT_EXPIRATION:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.hostel.management: INFO
    org.springframework.security: WARN
